<ion-content class="ion-padding">
    <div class="btn-container">
        <button class="coli-btn coli-btn-w-icon" (click)="exportCSV()">
            <ion-icon name="download"></ion-icon>
            <span>Exporter le log (CSV)</span>
        </button>
    </div>

    <ion-list>
        <ion-item *ngFor="let audit of auditList">
            <ion-item>
                <p>
                    {{audit.formattedDate()}} : {{audit.regimeId}} - {{audit.stateBefore}}
                    <ion-icon color="light" name="arrow-forward"></ion-icon>
                    {{audit.stateCurrent}}
                </p>
            </ion-item>
        </ion-item>
    </ion-list>
    <ion-infinite-scroll (ionInfinite)="onIonInfinite($event)">
        <ion-infinite-scroll-content></ion-infinite-scroll-content>
    </ion-infinite-scroll>

</ion-content>

<ion-footer>
    <button class="coli-btn coli-btn-w-icon" (click)="back()">
        <ion-icon name="arrow-back-circle"></ion-icon>
        <span>Retour</span>
    </button>
</ion-footer>
